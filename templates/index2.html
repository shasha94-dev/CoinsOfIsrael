<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0038b8">
    <title>{{ og_title | default('ארכיון המטבעות הישראלי') }}</title>
    
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:image" content="{{ og_image }}"> 
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_desc }}">
    <meta name="twitter:image" content="{{ og_image }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script data-goatcounter="https://coinsofisrael.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Heebo:wght@400;600;700;900&display=swap');

        :root {
            --primary: #0038b8;
            --primary-dark: #052b88;
            --primary-soft: #e8efff;
            --accent: #f7c948;
            --bg: #f6f8ff;
            --surface: #ffffff;
            --surface-muted: #f3f6fb;
            --text: #172033;
            --muted: #667085;
            --border: #d9e2f0;
            --border-strong: #b9c7dc;
            --danger: #b42318;
            --shadow-sm: 0 8px 22px rgba(16, 24, 40, 0.08);
            --shadow-md: 0 18px 45px rgba(16, 24, 40, 0.14);
            --shadow-lg: 0 28px 80px rgba(0, 18, 61, 0.32);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --container: 1180px;
        }
        
        *, *::before, *::after { box-sizing: border-box; }

        html {
            width: 100%;
            scroll-behavior: smooth;
            scroll-padding-top: 24px;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Heebo', 'Assistant', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(0, 56, 184, 0.16), transparent 34rem),
                radial-gradient(circle at 10% 18%, rgba(247, 201, 72, 0.18), transparent 24rem),
                linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #eef3ff 100%);
            text-align: right;
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        a { color: inherit; }
        img { max-width: 100%; }
        button, input, select { font: inherit; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: fixed;
            inset-block-start: 12px;
            inset-inline-start: 12px;
            transform: translateY(-140%);
            background: #101828;
            color: #fff;
            padding: 10px 16px;
            border-radius: 999px;
            z-index: 9999;
            transition: transform 0.2s ease;
            text-decoration: none;
            font-weight: 700;
            box-shadow: var(--shadow-sm);
        }
        .skip-link:focus { transform: translateY(0); }

        button:focus-visible,
        a:focus-visible,
        select:focus-visible,
        input:focus-visible,
        .coin-card:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 3px;
        }

        .site-header {
            position: relative;
            padding: 26px 18px 14px;
        }

        .hero-shell {
            width: min(100%, var(--container));
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: var(--radius-lg);
            background:
                linear-gradient(135deg, rgba(0, 56, 184, 0.96), rgba(0, 83, 204, 0.86)),
                radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.34), transparent 20rem);
            color: #fff;
            box-shadow: var(--shadow-lg);
        }

        .hero-shell::before,
        .hero-shell::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            pointer-events: none;
        }
        .hero-shell::before {
            width: 340px;
            height: 340px;
            inset-block-start: -170px;
            inset-inline-end: -110px;
            background: rgba(255, 255, 255, 0.12);
        }
        .hero-shell::after {
            width: 220px;
            height: 220px;
            inset-block-end: 78px;
            inset-inline-start: -70px;
            border: 38px solid rgba(247, 201, 72, 0.18);
        }

        .topbar,
        .hero-content,
        .toolbar-panel { position: relative; z-index: 1; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 18px 22px 0;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.9);
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        .brand-mark::before {
            content: '₪';
            display: inline-grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.28);
            color: #fff;
            font-weight: 900;
        }

        .lang-btn {
            min-width: 126px;
            min-height: 42px;
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 999px;
            color: #fff;
            background: rgba(255,255,255,0.14);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-1px); }

        .hero-content {
            max-width: 820px;
            padding: 36px 34px 28px;
            margin: 0 auto;
            text-align: center;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            font-weight: 700;
        }
        .eyebrow::before { content: '✦'; color: var(--accent); }

        h1 {
            margin: 0;
            color: #fff;
            text-align: center;
            font-size: clamp(2.2rem, 7vw, 4.9rem);
            line-height: 1;
            letter-spacing: -0.04em;
            font-weight: 900;
            text-wrap: balance;
        }

        .site-subtitle {
            margin: 18px auto 0;
            max-width: 720px;
            color: rgba(255,255,255,0.84);
            font-size: clamp(1rem, 2.6vw, 1.25rem);
            line-height: 1.7;
        }

        .toolbar-panel {
            width: min(calc(100% - 34px), 1050px);
            margin: 0 auto 22px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 24px;
            background: rgba(255,255,255,0.96);
            color: var(--text);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(18px);
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toolbar-row + .toolbar-row { margin-top: 12px; }
        .toolbar-row--split { justify-content: space-between; }

        .controls {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface-muted);
        }

        .control-button,
        .controls button,
        .link-button,
        .modal-action-btn {
            border: 0;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
        }

        .control-button,
        .controls button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            min-width: 142px;
            padding: 10px 18px;
            border-radius: 999px;
            background: transparent;
            color: #475467;
            font-weight: 800;
            white-space: nowrap;
        }
        .control-button:hover,
        .controls button:hover { background: #fff; color: var(--primary); transform: translateY(-1px); }
        .controls button.active,
        .controls button.cat-active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 10px 24px rgba(0, 56, 184, 0.24);
        }
        .controls button.cat-active { background: #1d2939; }
        .controls button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            background: transparent;
            color: #98a2b3;
            box-shadow: none;
            transform: none;
        }

        .search-wrap {
            position: relative;
            flex: 1 1 320px;
            max-width: 520px;
        }
        .search-wrap::before {
            content: '⌕';
            position: absolute;
            inset-block-start: 50%;
            inset-inline-start: 16px;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.3rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            min-height: 50px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #fff;
            color: var(--text);
            padding: 12px 48px 12px 48px;
            box-shadow: inset 0 1px 0 rgba(16, 24, 40, 0.03);
        }
        .search-input::placeholder { color: #8a95a6; }
        .clear-search {
            position: absolute;
            inset-block-start: 50%;
            inset-inline-end: 8px;
            transform: translateY(-50%);
            display: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 0;
            background: var(--surface-muted);
            color: var(--muted);
            cursor: pointer;
            font-size: 1.05rem;
            line-height: 1;
        }
        .clear-search.is-visible { display: inline-grid; place-items: center; }
        .clear-search:hover { background: var(--primary-soft); color: var(--primary); }

        .jump-select {
            flex: 0 1 230px;
            min-height: 50px;
            padding: 12px 18px;
            padding-inline-start: 42px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background-color: #fff;
            color: var(--primary);
            cursor: pointer;
            font-weight: 800;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%230038b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: left 18px center;
            background-size: 12px auto;
        }
        .jump-select:disabled { opacity: 0.55; cursor: not-allowed; }

        .about-link {
            min-height: 50px;
            border: 1px solid var(--border);
            background: #fff;
            color: #344054;
            box-shadow: none;
        }
        .about-link:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 28px;
            margin-top: 12px;
            padding: 0 6px;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .result-summary { font-weight: 700; }
        .link-button {
            display: none;
            padding: 0;
            background: transparent;
            color: var(--primary);
            font-weight: 800;
        }
        .link-button.is-visible { display: inline-flex; }
        .link-button:hover { color: var(--primary-dark); text-decoration: underline; }

        main {
            width: min(100%, var(--container));
            margin: 0 auto;
            padding: 18px 18px 0;
        }

        .gallery { min-height: 360px; }

        .group-section {
            margin-bottom: 72px;
            scroll-margin-top: 26px;
            content-visibility: auto;
            contain-intrinsic-size: 1px 820px;
        }
        .group-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
            padding: 0 4px 14px;
            border-bottom: 1px solid var(--border);
        }
        .group-title {
            margin: 0;
            color: #263247;
            font-size: clamp(2rem, 5vw, 3.3rem);
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        .series-headline {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            max-width: 100%;
            margin: 38px 0 22px;
            padding: 13px 20px;
            border: 1px solid rgba(0,56,184,0.18);
            border-radius: 999px;
            background: linear-gradient(135deg, #ffffff 0%, var(--primary-soft) 100%);
            color: var(--primary-dark);
            font-size: clamp(1.05rem, 2.6vw, 1.35rem);
            line-height: 1.35;
            font-weight: 900;
            box-shadow: var(--shadow-sm);
            scroll-margin-top: 26px;
        }
        .series-headline::before {
            content: '';
            flex: 0 0 auto;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 5px rgba(247, 201, 72, 0.18);
        }

        .coin-type-row {
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px dashed rgba(102, 112, 133, 0.28);
        }
        .coin-type-row:last-child { border-bottom: none; }

        .coin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
            gap: 18px;
        }
        .coin-card {
            position: relative;
            display: flex;
            min-width: 0;
            width: 100%;
            min-height: 100%;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(185, 199, 220, 0.78);
            border-radius: 22px;
            background: rgba(255,255,255,0.96);
            color: var(--text);
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            isolation: isolate;
        }
        .coin-card::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.52), transparent 45%);
            z-index: -1;
        }
        .coin-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,56,184,0.28);
            box-shadow: 0 20px 40px rgba(16, 24, 40, 0.16);
        }
        .coin-card:active { transform: translateY(-1px); }

        .coin-img-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            min-height: 172px;
            overflow: hidden;
            padding: 16px;
            background:
                radial-gradient(circle at 50% 45%, #ffffff 0%, #edf3ff 54%, #e2e9f7 100%);
        }
        .coin-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 13px 15px rgba(16, 24, 40, 0.18));
            transition: transform 0.22s ease;
        }
        .coin-card:hover .coin-img-wrapper img { transform: scale(1.045) rotate(-0.5deg); }

        .no-image {
            width: 100%;
            height: 100%;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: repeating-linear-gradient(135deg, #e8edf6, #e8edf6 10px, #f2f5fa 10px, #f2f5fa 20px);
            color: #98a2b3;
            font-size: 3.2rem;
            font-weight: 900;
        }
        .coin-info {
            display: flex;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            padding: 15px 14px 17px;
        }
        .coin-name {
            width: 100%;
            color: #1f2937;
            font-weight: 900;
            font-size: 1rem;
            line-height: 1.35;
        }
        .coin-meta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--surface-muted);
            color: var(--muted);
            direction: ltr;
            font-size: 0.86rem;
            font-weight: 800;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            max-width: 100%;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--primary);
            color: #fff;
            font-size: 0.76rem;
            font-weight: 800;
            line-height: 1.3;
        }
        .badge.gray { background: #667085; color: #fff; }

        .empty-state,
        .error-state,
        .loading-state {
            display: grid;
            place-items: center;
            min-height: 340px;
            padding: 26px;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.74);
            box-shadow: var(--shadow-sm);
            text-align: center;
        }
        .empty-state-inner,
        .error-state-inner { max-width: 520px; }
        .empty-icon,
        .error-icon {
            display: inline-grid;
            place-items: center;
            width: 70px;
            height: 70px;
            margin-bottom: 14px;
            border-radius: 50%;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 2rem;
            font-weight: 900;
        }
        .error-icon { background: #fee4e2; color: var(--danger); }
        .empty-state h2,
        .error-state h2 { margin: 0 0 8px; font-size: 1.5rem; }
        .empty-state p,
        .error-state p { margin: 0 0 18px; color: var(--muted); line-height: 1.65; }
        .primary-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 18px;
            border: 0;
            border-radius: 999px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-weight: 900;
        }
        .primary-action:hover { background: var(--primary-dark); }

        .skeleton-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
            gap: 18px;
        }
        .skeleton-card {
            height: 252px;
            border-radius: 22px;
            background: linear-gradient(90deg, rgba(222,231,245,0.76), rgba(255,255,255,0.94), rgba(222,231,245,0.76));
            background-size: 220% 100%;
            animation: shimmer 1.35s infinite linear;
        }
        @keyframes shimmer { to { background-position: -220% 0; } }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            padding: 18px;
            background: rgba(8, 13, 26, 0.78);
            backdrop-filter: blur(10px);
        }
        .modal.is-open { display: grid; place-items: center; }
        .modal-content {
            width: min(100%, 1060px);
            max-height: min(94vh, 920px);
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.85fr);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 26px;
            background: #fff;
            box-shadow: var(--shadow-lg);
            animation: popup 0.22s ease-out;
        }
        @keyframes popup {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-left {
            min-height: 420px;
            max-height: min(94vh, 920px);
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow-y: auto;
            padding: 24px 0;
            background:
                radial-gradient(circle at center, rgba(255,255,255,0.12), transparent 22rem),
                #05070d;
        }
        .modal-image-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 22px 30px;
            margin-bottom: 20px;
        }
        .modal-image-wrapper:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.16); }
        .modal-left img {
            max-width: 94%;
            max-height: 74vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            cursor: zoom-in;
            filter: drop-shadow(0 18px 26px rgba(0, 0, 0, 0.55));
        }
        .modal-right {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 28px;
            background:
                linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            text-align: right;
        }
        .modal-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 18px;
        }
        .modal-action-group { display: flex; align-items: center; gap: 8px; }
        .modal-action-btn,
        .close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #fff;
            color: #344054;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(16, 24, 40, 0.06);
        }
        .modal-action-btn { padding: 8px 14px; gap: 8px; }
        .modal-action-btn:hover,
        .close-btn:hover { border-color: var(--primary); color: var(--primary); }
        .close-btn {
            width: 42px;
            padding: 0;
            font-size: 1.55rem;
            line-height: 1;
            cursor: pointer;
        }
        .modal-kicker {
            margin: 0 0 8px;
            color: var(--primary);
            font-weight: 900;
            letter-spacing: 0.02em;
        }
        .modal-title {
            margin: 0 0 10px;
            color: #101828;
            font-size: clamp(1.75rem, 4vw, 2.55rem);
            line-height: 1.08;
            font-weight: 900;
            letter-spacing: -0.035em;
        }
        .modal-subtitle {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            max-width: 100%;
            margin-bottom: 18px;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-size: 0.98rem;
            font-weight: 900;
        }
        .modal-desc {
            margin: 0 0 18px;
            color: #344054;
            line-height: 1.75;
            font-size: 1rem;
        }
        .stats-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #fff;
            font-size: 0.94rem;
        }
        .stats-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
        .stats-table td {
            padding: 12px 14px;
            vertical-align: top;
        }
        .stats-key {
            width: 42%;
            color: #475467;
            background: #f8fafc;
            font-weight: 900;
            text-align: right;
        }
        .stats-val { color: #1f2937; font-weight: 600; }
        .modal-feedback {
            min-height: 22px;
            margin-top: 12px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .modal-content.no-details {
            grid-template-columns: 1fr;
            background: #05070d;
        }
        .modal-content.no-details .modal-right {
            order: -1;
            max-height: none;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            text-align: center;
        }
        .modal-content.no-details .modal-actions { margin-bottom: 10px; }
        .modal-content.no-details .modal-left { min-height: 520px; }
        .modal-content.no-details .modal-left img { max-width: 72%; }

        .back-to-top {
            position: fixed;
            inset-block-end: 20px;
            inset-inline-end: 20px;
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-size: 1.35rem;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 900;
        }
        .back-to-top.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .back-to-top:hover { background: var(--primary-dark); }

        footer {
            width: min(100%, var(--container));
            margin: 54px auto 0;
            padding: 24px 18px 34px;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }
        footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 900;
        }
        footer a:hover { text-decoration: underline; }

        html[dir="ltr"] body { text-align: left; }
        html[dir="ltr"] .modal-right { text-align: left; }
        html[dir="ltr"] .stats-key { text-align: left; }
        html[dir="ltr"] .jump-select {
            background-position: right 18px center;
            padding-inline-start: 18px;
            padding-inline-end: 42px;
        }

        @media (max-width: 920px) {
            .site-header { padding: 12px; }
            .hero-shell { border-radius: 22px; }
            .topbar { padding: 14px 14px 0; }
            .brand-mark span { display: none; }
            .hero-content { padding: 28px 18px 20px; }
            .toolbar-panel { width: calc(100% - 18px); padding: 12px; border-radius: 20px; }
            .toolbar-row--split { justify-content: center; }
            .controls { width: 100%; border-radius: 18px; }
            .control-button,
            .controls button { flex: 1 1 136px; min-width: 0; }
            .search-wrap { flex-basis: 100%; max-width: none; }
            .jump-select,
            .about-link { flex: 1 1 220px; }
            main { padding-inline: 12px; }
            .coin-grid { grid-template-columns: repeat(auto-fill, minmax(152px, 1fr)); gap: 14px; }
            .coin-img-wrapper { min-height: 150px; }
            .modal { padding: 10px; }
            .modal-content,
            .modal-content.no-details {
                width: 100%;
                max-height: 94vh;
                grid-template-columns: 1fr;
                overflow-y: auto;
            }
            .modal-right {
                order: 1;
                max-height: none;
                padding: 20px;
                text-align: center;
                align-items: center;
            }
            html[dir="ltr"] .modal-right { text-align: center; }
            .modal-actions { width: 100%; }
            .modal-left {
                order: 2;
                min-height: 300px;
                max-height: none;
                padding: 20px 0;
            }
            .modal-left img,
            .modal-content.no-details .modal-left img {
                max-width: 86vw;
                max-height: 48vh;
            }
            .stats-key,
            .stats-table td { text-align: center !important; }
        }

        @media (max-width: 560px) {
            .site-header { padding-inline: 8px; }
            .topbar { align-items: flex-start; }
            .lang-btn { min-width: 112px; min-height: 38px; font-size: 0.92rem; }
            .eyebrow { font-size: 0.86rem; }
            .site-subtitle { font-size: 0.98rem; }
            .toolbar-row { gap: 8px; }
            .controls { gap: 6px; padding: 5px; }
            .controls button,
            .control-button { min-height: 42px; padding: 9px 12px; font-size: 0.92rem; }
            .status-row { flex-direction: column; justify-content: center; text-align: center; }
            .coin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .coin-card { border-radius: 18px; }
            .coin-img-wrapper { min-height: 132px; padding: 12px; }
            .coin-name { font-size: 0.93rem; }
            .modal-title { font-size: 1.65rem; }
            .modal-action-btn span { display: none; }
            .back-to-top { inset-block-end: 14px; inset-inline-end: 14px; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
            .coin-card:hover,
            .lang-btn:hover { transform: none; }
        }
    </style>
</head>
<body>

<a href="#main-content" class="skip-link" id="skip-link">דלג לתוכן</a>

<header class="site-header" role="banner">
    <div class="hero-shell">
        <div class="topbar">
            <div class="brand-mark" aria-hidden="true"><span id="brand-label">מטבעות ישראל</span></div>
            <button class="lang-btn" type="button" onclick="toggleLanguage()">🇺🇸 English</button>
        </div>

        <div class="hero-content">
            <p class="eyebrow" id="site-eyebrow">מטבעות ישראל</p>
            <h1 id="site-title">ארכיון המטבעות הישראלי</h1>
            <p class="site-subtitle" id="site-subtitle">חפשו, סננו וגלו מטבעות ושטרות לפי שנה, סדרה וסוג.</p>
        </div>
        
        <div class="toolbar-panel" id="toolbar-panel" aria-label="כלי ניווט וסינון">
            <div class="toolbar-row">
                <nav class="controls" id="category-nav" aria-label="קטגוריה">
                    <button type="button" id="btn-cat-circ" class="cat-active" onclick="setCategory('circulation')" aria-pressed="true">מחזור</button>
                    <button type="button" id="btn-cat-sets" onclick="setCategory('sets')" aria-pressed="false">סטים לאספנים</button>
                </nav>

                <nav class="controls" id="view-nav" aria-label="אפשרויות תצוגה">
                    <button type="button" id="btn-year" class="active" onclick="setView('year')" aria-pressed="true">לפי שנה</button>
                    <button type="button" id="btn-coin" onclick="setView('coin')" aria-pressed="false">לפי סוג</button>
                </nav>
            </div>

            <div class="toolbar-row toolbar-row--split">
                <div class="search-wrap">
                    <input id="search-input" class="search-input" type="search" inputmode="search" autocomplete="off" dir="auto" placeholder="חיפוש לפי שנה, שם, סדרה או תיאור" aria-label="חיפוש לפי שנה, שם, סדרה או תיאור">
                    <button type="button" id="clear-search" class="clear-search" onclick="clearSearch()" aria-label="נקה חיפוש">×</button>
                </div>

                <select id="jump-select" class="jump-select" onchange="jumpToSection(this.value)" aria-label="קפוץ לשנה או נושא">
                    <option id="jump-default" value="">קפוץ ל...</option>
                </select>

                <a class="control-button about-link" id="btn-about" href="/about">אודות ותודות</a>
            </div>

            <div class="status-row" aria-live="polite">
                <div id="result-summary" class="result-summary">טוען נתונים...</div>
                <button type="button" id="clear-filters" class="link-button" onclick="clearSearch()">נקה חיפוש</button>
            </div>
        </div>
    </div>
</header>

<main id="main-content" tabindex="-1">
    <div id="gallery" class="gallery" role="region" aria-live="polite"></div>
</main>

<footer>
    <a href="/accessibility" id="footer-acc">הצהרת נגישות</a>
</footer>

<button id="back-to-top" class="back-to-top" type="button" onclick="scrollToTop()" aria-label="חזרה לראש העמוד">↑</button>

<div id="coinModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-subtitle">
    <div class="modal-content">
        <div id="modal-images-container" class="modal-left" aria-label="תמונות המטבע"></div>
        <aside class="modal-right" aria-label="פרטי המטבע">
            <div class="modal-actions">
                <button type="button" id="btn-share" class="modal-action-btn" onclick="copyCurrentCoinLink()" aria-label="העתק קישור למטבע">🔗 <span>העתק קישור</span></button>
                <button type="button" class="close-btn" onclick="closeModal()" aria-label="סגור חלונית">&times;</button>
            </div>
            <p id="modal-kicker" class="modal-kicker"></p>
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-subtitle" class="modal-subtitle"></div>
            <div id="modal-desc" class="modal-desc"></div>
            <table class="stats-table" id="modal-stats">
                <caption class="sr-only" id="stats-caption">פרטי המטבע</caption>
            </table>
            <div id="modal-feedback" class="modal-feedback" aria-live="polite"></div>
        </aside>
    </div>
</div>

<script>
    let allCoins = [];
    let translationMap = {}; 
    let sortConfig = {};
    let galleryViewer = null;
    let lastFocusedElement = null;
    let searchQuery = '';
    let currentCoinSlug = '';
    const coinLookup = new Map();

    const initialParams = new URLSearchParams(window.location.search);
    let currentLang = initialParams.get('lang') === 'en' ? 'en' : 'he';
    const catMap = { 'circulation': 'מחזור', 'sets': 'סטים לאספנים' };
    let currentCategory = catMap[initialParams.get('category') || 'circulation'] || 'מחזור';
    const requestedView = initialParams.get('view');
    let currentView = ['year', 'coin'].includes(requestedView) ? requestedView : 'year';

    const uiFallback = {
        en: {
            'מטבעות ישראל': 'Coins of Israel',
            'קטגוריה': 'Category',
            'אפשרויות תצוגה': 'View options',
            'כלי ניווט וסינון': 'Navigation and filters',
            'ארכיון המטבעות הישראלי': 'The Israeli Coin Archive',
            'חפשו, סננו וגלו מטבעות ושטרות לפי שנה, סדרה וסוג.': 'Search, filter, and explore Israeli coins by year, series, and type.',
            'מחזור': 'Circulation',
            'סטים לאספנים': 'Collector sets',
            'לפי שנה': 'By year',
            'לפי סוג': 'By type',
            'אודות ותודות': 'About & credits',
            'הצהרת נגישות': 'Accessibility statement',
            'דלג לתוכן': 'Skip to content',
            'קפוץ ל...': 'Jump to...',
            'קפוץ לשנה או נושא': 'Jump to a year or topic',
            'חיפוש לפי שנה, שם, סדרה או תיאור': 'Search by year, name, series, or description',
            'נקה חיפוש': 'Clear search',
            'טוען נתונים...': 'Loading data...',
            'מציג': 'Showing',
            'מתוך': 'of',
            'פריטים': 'items',
            'אין תוצאות': 'No results',
            'לא נמצאו מטבעות שמתאימים לחיפוש.': 'No coins match this search.',
            'נקה את החיפוש או נסה מילות מפתח אחרות.': 'Clear the search or try different keywords.',
            'הנתונים לא נטענו': 'Data could not be loaded',
            'בדקו את החיבור או נסו לרענן את העמוד.': 'Check the connection or refresh the page.',
            'רענון': 'Refresh',
            'שנה': 'Year',
            'סדרה': 'Series',
            'סוג': 'Type',
            'פרטי המטבע': 'Coin details',
            'תמונות המטבע': 'Coin images',
            'סגור חלונית': 'Close dialog',
            'העתק קישור': 'Copy link',
            'העתק קישור למטבע': 'Copy coin link',
            'הקישור הועתק': 'Link copied',
            'לא ניתן להעתיק את הקישור': 'Could not copy link',
            'הגדלת תמונה של': 'Zoomed image of',
            'חזרה לראש העמוד': 'Back to top',
            'מטבע': 'Coin'
        },
        he: {}
    };

    showLoadingState();

    Promise.all([
        fetch('/api/data').then(res => {
            if (!res.ok) throw new Error('Failed to load data');
            return res.json();
        }),
        fetch('/api/translations').then(res => {
            if (!res.ok) throw new Error('Failed to load translations');
            return res.json();
        })
    ]).then(([data, translations]) => {
        allCoins = Array.isArray(data.coins) ? data.coins : [];
        sortConfig = data.config || {};
        translationMap = translations || {};
        updateState(false);
        checkUrlAndOpen();
    }).catch(() => {
        updateStaticLabels();
        showErrorState();
    });

    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', (event) => {
        searchQuery = event.target.value.trim();
        updateSearchControls();
        setView(currentView, false);
    });

    window.addEventListener('popstate', () => {
        syncStateFromUrl();
    });

    window.addEventListener('scroll', () => {
        const btn = document.getElementById('back-to-top');
        if (btn) btn.classList.toggle('is-visible', window.scrollY > 520);
    }, { passive: true });

    document.getElementById('coinModal').addEventListener('click', (event) => {
        if (event.target === document.getElementById('coinModal')) closeModal();
    });

    function updateState(pushHistory = true) {
        document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        document.body.style.textAlign = currentLang === 'he' ? 'right' : 'left';
        updateStaticLabels();

        const isSets = currentCategory === 'סטים לאספנים';
        const catKey = isSets ? 'sets' : 'circulation';

        setPressed(document.getElementById('btn-cat-circ'), !isSets, 'cat-active');
        setPressed(document.getElementById('btn-cat-sets'), isSets, 'cat-active');
        
        const btnYear = document.getElementById('btn-year');
        const btnCoin = document.getElementById('btn-coin');
        btnYear.disabled = isSets;
        btnCoin.disabled = isSets;
        btnYear.setAttribute('aria-disabled', isSets ? 'true' : 'false');
        btnCoin.setAttribute('aria-disabled', isSets ? 'true' : 'false');

        if (pushHistory) {
            const url = new URL(window.location);
            url.searchParams.set('lang', currentLang);
            url.searchParams.set('category', catKey);
            url.searchParams.set('view', isSets ? 'sets' : currentView);
            window.history.pushState({}, '', url);
        }

        setView(isSets ? 'sets' : currentView, false);
    }

    function updateStaticLabels() {
        document.querySelector('.lang-btn').textContent = currentLang === 'he' ? '🇺🇸 English' : '🇮🇱 עברית';
        document.getElementById('brand-label').textContent = getTrans('מטבעות ישראל');
        document.getElementById('site-eyebrow').textContent = getTrans('מטבעות ישראל');
        document.getElementById('site-title').textContent = getTrans('ארכיון המטבעות הישראלי');
        document.getElementById('site-subtitle').textContent = getTrans('חפשו, סננו וגלו מטבעות ושטרות לפי שנה, סדרה וסוג.');
        document.getElementById('skip-link').textContent = getTrans('דלג לתוכן');
        document.getElementById('btn-year').textContent = getTrans('לפי שנה');
        document.getElementById('btn-coin').textContent = getTrans('לפי סוג');
        document.getElementById('btn-about').textContent = getTrans('אודות ותודות');
        document.getElementById('footer-acc').textContent = getTrans('הצהרת נגישות');
        document.getElementById('btn-cat-circ').textContent = getTrans('מחזור');
        document.getElementById('btn-cat-sets').textContent = getTrans('סטים לאספנים');
        document.getElementById('jump-default').textContent = getTrans('קפוץ ל...');
        document.getElementById('jump-select').setAttribute('aria-label', getTrans('קפוץ לשנה או נושא'));
        document.getElementById('toolbar-panel').setAttribute('aria-label', getTrans('כלי ניווט וסינון'));
        document.getElementById('category-nav').setAttribute('aria-label', getTrans('קטגוריה'));
        document.getElementById('view-nav').setAttribute('aria-label', getTrans('אפשרויות תצוגה'));
        document.getElementById('search-input').placeholder = getTrans('חיפוש לפי שנה, שם, סדרה או תיאור');
        document.getElementById('search-input').setAttribute('aria-label', getTrans('חיפוש לפי שנה, שם, סדרה או תיאור'));
        document.getElementById('clear-search').setAttribute('aria-label', getTrans('נקה חיפוש'));
        document.getElementById('clear-filters').textContent = getTrans('נקה חיפוש');
        document.getElementById('back-to-top').setAttribute('aria-label', getTrans('חזרה לראש העמוד'));
        document.getElementById('btn-share').setAttribute('aria-label', getTrans('העתק קישור למטבע'));
        document.querySelector('#btn-share span').textContent = getTrans('העתק קישור');
        document.querySelector('.close-btn').setAttribute('aria-label', getTrans('סגור חלונית'));
        document.getElementById('modal-images-container').setAttribute('aria-label', getTrans('תמונות המטבע'));
        document.querySelector('.modal-right').setAttribute('aria-label', getTrans('פרטי המטבע'));
        document.getElementById('stats-caption').textContent = getTrans('פרטי המטבע');
        updateSearchControls();
    }

    function setPressed(button, isPressed, activeClass) {
        button.classList.toggle(activeClass, isPressed);
        button.setAttribute('aria-pressed', isPressed ? 'true' : 'false');
    }

    function syncStateFromUrl() {
        const params = new URLSearchParams(window.location.search);
        currentLang = params.get('lang') === 'en' ? 'en' : 'he';
        currentCategory = catMap[params.get('category') || 'circulation'] || 'מחזור';
        const urlView = params.get('view');
        currentView = ['year', 'coin'].includes(urlView) ? urlView : 'year';
        updateState(false);
        checkUrlAndOpen();
    }

    function toggleLanguage() {
        currentLang = currentLang === 'he' ? 'en' : 'he';
        updateState();
    }

    function setCategory(catKey) {
        currentCategory = catMap[catKey] || 'מחזור';
        if (currentCategory === 'מחזור' && !['year', 'coin'].includes(currentView)) {
            currentView = 'year';
        }
        updateState();
    }

    function getTrans(text) {
        if (text === null || text === undefined || text === '') return '';
        if (typeof text === 'object' && text.he) text = text.he;
        if (typeof text !== 'string' && typeof text !== 'number') return '';
        const key = String(text);
        if (currentLang === 'en') return translationMap[key] || uiFallback.en[key] || key;
        return uiFallback.he[key] || key;
    }

    function getCanonical(obj) {
        if (obj === null || obj === undefined || obj === '') return '';
        if (typeof obj === 'string' || typeof obj === 'number') return String(obj);
        return obj.he || '';
    }

    function escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = value == null ? '' : String(value);
        return div.innerHTML;
    }

    function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function getCoinSlug(coin) {
        const nameHe = getCanonical(coin.name);
        const seriesHe = getCanonical(coin.series);
        const subtypeHe = coin.subtype ? getCanonical(coin.subtype) : '';
        let slug = `${coin.year}_${nameHe}_${seriesHe}`;
        if (subtypeHe && subtypeHe !== 'ללא תיוג') slug += `_${subtypeHe}`;
        return slug.replace(/\s+/g, '-').replace(/[()]/g, '');
    }

    function createSectionId(key) {
        return 'section-' + String(key)
            .trim()
            .replace(/\s+/g, '-')
            .replace(/[()]/g, '')
            .replace(/[^\w\u0590-\u05FF-]+/g, '-');
    }

    function checkUrlAndOpen() {
        const params = new URLSearchParams(window.location.search);
        const coinSlug = params.get('coin');
        
        if (coinSlug) {
            const targetCoin = coinLookup.get(coinSlug) || allCoins.find(c => getCoinSlug(c) === coinSlug);
            if (targetCoin) openModalByCoin(targetCoin, false);
        } else if (isModalOpen()) {
            closeModal(false);
        }

        if (!coinSlug && window.location.hash) {
            window.setTimeout(() => {
                const targetId = decodeURIComponent(window.location.hash.substring(1));
                const targetElement = document.getElementById(targetId);
                if (targetElement) targetElement.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'start' });
            }, 220);
        }
    }

    function extractYear(str) {
        if (!str) return 9999;
        const match = String(str).match(/(\d{4})/);
        return match ? parseInt(match[0], 10) : 9999;
    }

    function getNumericValue(nameObj) {
        const name = getCanonical(nameObj); 
        if (name.includes('/')) {
            const parts = name.split('/');
            if (parts.length >= 2) {
                const numMatch = parts[0].match(/[\d.]+/);
                const denMatch = parts[1].match(/[\d.]+/);
                const num = numMatch ? parseFloat(numMatch[0]) : 0;
                const den = denMatch ? parseFloat(denMatch[0]) : 0;
                if (num && den) return num / den;
            }
        }
        const match = name.match(/([\d.]+)/);
        return match ? parseFloat(match[0]) : 0;
    }

    function getSeriesRank(seriesObj) {
        const name = getCanonical(seriesObj); 
        if (!sortConfig.series_order) return 9999;
        const index = sortConfig.series_order.indexOf(name);
        return index !== -1 ? index : 9999;
    }

    function getCoinRank(seriesObj, coinNameObj) {
        const sName = getCanonical(seriesObj);
        const cName = getCanonical(coinNameObj);
        if (!sortConfig.coin_order || !sortConfig.coin_order[sName]) return 9999;
        const index = sortConfig.coin_order[sName].indexOf(cName);
        return index !== -1 ? index : 9999;
    }

    function updateJumpSelect(items) {
        const select = document.getElementById('jump-select');
        while (select.options.length > 1) select.remove(1);
        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.text = item.label; 
            select.add(opt);
        });
        select.disabled = items.length === 0;
    }

    function jumpToSection(id) {
        if (!id) return;
        const element = document.getElementById(id);
        if (element) {
            element.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'start' });
            const url = new URL(window.location);
            url.hash = id;
            window.history.pushState({}, '', url);
            document.getElementById('jump-select').selectedIndex = 0;
        }
    }

    function setView(mode, updateUrl = true) {
        currentView = mode;
        const isSetsMode = mode === 'sets';
        const btnYear = document.getElementById('btn-year');
        const btnCoin = document.getElementById('btn-coin');

        if (isSetsMode) {
            setPressed(btnYear, false, 'active');
            setPressed(btnCoin, false, 'active');
        } else {
            setPressed(btnYear, mode === 'year', 'active');
            setPressed(btnCoin, mode === 'coin', 'active');
        }
        
        if (updateUrl && !isSetsMode) {
            const url = new URL(window.location);
            url.searchParams.set('view', mode);
            window.history.pushState({}, '', url);
        }

        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';
        coinLookup.clear();

        const totalInCategory = allCoins.filter(c => getCanonical(c.category) === currentCategory).length;
        const filteredCoins = getFilteredCoins();
        updateResultsSummary(filteredCoins.length, totalInCategory);

        if (filteredCoins.length === 0) {
            showEmptyState();
            updateJumpSelect([]);
            return;
        }

        let grouped;
        if (isSetsMode) {
            grouped = filteredCoins.reduce((acc, coin) => {
                const sKey = getCanonical(coin.series);
                acc[sKey] = acc[sKey] || [];
                acc[sKey].push(coin);
                return acc;
            }, {});
        } else {
            grouped = groupData(filteredCoins, mode);
        }
        
        const keys = Object.keys(grouped).sort((a, b) => {
            if (mode === 'year') return extractYear(a) - extractYear(b); 
            if (isSetsMode) {
                const idxA = sortConfig.series_order ? sortConfig.series_order.indexOf(a) : -1;
                const idxB = sortConfig.series_order ? sortConfig.series_order.indexOf(b) : -1;
                return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
            }
            const coinA = grouped[a][0];
            const coinB = grouped[b][0];
            const seriesRankA = getSeriesRank(coinA.series);
            const seriesRankB = getSeriesRank(coinB.series);
            if (seriesRankA !== seriesRankB) return seriesRankA - seriesRankB;
            const coinRankA = getCoinRank(coinA.series, coinA.name);
            const coinRankB = getCoinRank(coinB.series, coinB.name);
            if (coinRankA !== coinRankB) return coinRankA - coinRankB;
            return getNumericValue(coinA.name) - getNumericValue(coinB.name);
        });

        const jumpItems = [];
        let lastSeriesName = null;

        keys.forEach(key => {
            const sectionId = createSectionId(key);
            const coinObj = grouped[key][0]; 
            let displayLabel = key;
            if (mode === 'year') displayLabel = key;
            else if (isSetsMode) displayLabel = getTrans(coinObj.series);
            else displayLabel = `${getTrans(coinObj.name)} (${getTrans(coinObj.series)})`;
            jumpItems.push({ id: sectionId, label: displayLabel });

            if (mode === 'year') {
                const section = document.createElement('section');
                section.className = 'group-section';
                section.id = sectionId;
                appendGroupHeader(section, displayLabel);
                renderYearSection(section, grouped[key], mode);
                gallery.appendChild(section);
                return;
            }

            const coinList = grouped[key].slice().sort((a, b) => extractYear(a.year) - extractYear(b.year));
            const currentSeriesCanonical = getCanonical(coinObj.series);
            const section = document.createElement('section');
            section.className = 'group-section';
            section.id = sectionId;

            if (isSetsMode) {
                appendSeriesHeadline(gallery, getTrans(coinObj.series), sectionId);
                section.removeAttribute('id');
            } else {
                if (currentSeriesCanonical !== lastSeriesName) {
                    appendSeriesHeadline(gallery, getTrans(coinObj.series));
                    lastSeriesName = currentSeriesCanonical;
                }
                appendGroupHeader(section, getTrans(coinObj.name));
            }
            renderRow(section, coinList, mode);
            gallery.appendChild(section);
        });
        updateJumpSelect(jumpItems);
    }

    function renderYearSection(section, coinsInYear, mode) {
        const bySeries = coinsInYear.reduce((acc, coin) => {
            const sKey = getCanonical(coin.series);
            acc[sKey] = acc[sKey] || [];
            acc[sKey].push(coin);
            return acc;
        }, {});

        const seriesKeys = Object.keys(bySeries).sort((sa, sb) => {
            const idxA = sortConfig.series_order ? sortConfig.series_order.indexOf(sa) : -1;
            const idxB = sortConfig.series_order ? sortConfig.series_order.indexOf(sb) : -1;
            return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
        });

        seriesKeys.forEach(sKey => {
            const firstCoin = bySeries[sKey][0];
            appendSeriesHeadline(section, getTrans(getCanonical(firstCoin.series)));

            const byCoinType = bySeries[sKey].reduce((acc, coin) => {
                const cKey = getCanonical(coin.name);
                acc[cKey] = acc[cKey] || [];
                acc[cKey].push(coin);
                return acc;
            }, {});

            const coinTypeKeys = Object.keys(byCoinType).sort((nA, nB) => {
                const order = sortConfig.coin_order && sortConfig.coin_order[sKey] ? sortConfig.coin_order[sKey] : [];
                const idxA = order.indexOf(nA);
                const idxB = order.indexOf(nB);
                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                if (idxA !== -1) return -1;
                if (idxB !== -1) return 1;
                return getNumericValue(nA) - getNumericValue(nB);
            });

            let simpleCoinsBuffer = [];
            coinTypeKeys.forEach(cType => {
                const coinsOfType = byCoinType[cType];
                if (coinsOfType.length > 1) {
                    if (simpleCoinsBuffer.length > 0) {
                        renderRow(section, simpleCoinsBuffer, mode);
                        simpleCoinsBuffer = [];
                    }
                    renderRow(section, coinsOfType, mode);
                } else {
                    simpleCoinsBuffer.push(coinsOfType[0]);
                }
            });
            if (simpleCoinsBuffer.length > 0) renderRow(section, simpleCoinsBuffer, mode);
        });
    }

    function appendGroupHeader(container, title) {
        const header = document.createElement('div');
        header.className = 'group-header';
        const h2 = document.createElement('h2');
        h2.className = 'group-title';
        h2.textContent = title;
        header.appendChild(h2);
        container.appendChild(header);
    }

    function appendSeriesHeadline(container, title, id) {
        const headline = document.createElement('div');
        headline.className = 'series-headline';
        if (id) headline.id = id;
        headline.textContent = title;
        container.appendChild(headline);
    }

    function renderRow(container, coins, mode) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'coin-type-row';
        rowDiv.innerHTML = `<div class="coin-grid">${coins.map(coin => createCardHtml(coin, mode)).join('')}</div>`;
        container.appendChild(rowDiv);
        rowDiv.querySelectorAll('.coin-card').forEach(card => {
            card.addEventListener('click', () => openModalBySlug(card.dataset.coinSlug));
        });
    }

    function createCardHtml(coin, mode) {
        const name = getTrans(getCanonical(coin.name));
        const series = getTrans(getCanonical(coin.series));
        const subtype = getTrans(getCanonical(coin.subtype));
        const slug = getCoinSlug(coin);
        coinLookup.set(slug, coin);

        let altText = `${getTrans('מטבע')} ${name}`;
        if (coin.stats && coin.stats.alt) altText = getTrans(coin.stats.alt);

        let imgHtml = `<div class="no-image" aria-hidden="true">?</div>`;
        if (coin.has_image && coin.images && coin.images.length > 0) {
            const folder = coin.thumb_available ? 'thumbnails' : 'images';
            imgHtml = `<img src="/${folder}/${escapeAttr(coin.thumb_src)}" loading="lazy" decoding="async" alt="${escapeAttr(altText)}" title="${escapeAttr(altText)}">`;
        }
        
        let badgeHtml = '';
        if (subtype && subtype !== getTrans('ללא תיוג')) {
            badgeHtml = `<span class="badge">${escapeHtml(subtype)}</span>`;
        } else if (subtype && subtype === getTrans('ללא תיוג')) {
            badgeHtml = `<span class="badge gray">${escapeHtml(subtype)}</span>`;
        }

        const yearLabel = getTrans('שנה');
        const ariaLabel = `${name}, ${yearLabel} ${coin.year}${subtype ? ', ' + subtype : ''}`;
        const meta = mode === 'year' ? series : coin.year;

        return `
            <button class="coin-card" type="button" data-coin-slug="${escapeAttr(slug)}" aria-label="${escapeAttr(ariaLabel)}" title="${escapeAttr(altText)}">
                <span class="coin-img-wrapper">${imgHtml}</span>
                <span class="coin-info">
                    <span class="coin-name">${escapeHtml(name)}</span>
                    <span class="coin-meta" aria-label="${escapeAttr(yearLabel)} ${escapeAttr(coin.year)}">${escapeHtml(meta)}</span>
                    ${badgeHtml}
                </span>
            </button>
        `;
    }

    function groupData(data, mode) {
        return data.reduce((acc, item) => {
            const key = mode === 'year'
                ? item.year
                : `${getCanonical(item.name)} (${getCanonical(item.series)})`;
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});
    }

    function getFilteredCoins() {
        const categoryCoins = allCoins.filter(c => getCanonical(c.category) === currentCategory);
        const normalizedQuery = normalizeText(searchQuery);
        if (!normalizedQuery) return categoryCoins;
        return categoryCoins.filter(coin => normalizeText(buildSearchText(coin)).includes(normalizedQuery));
    }

    function buildSearchText(coin) {
        return [
            coin.year,
            getCanonical(coin.name),
            getTrans(coin.name),
            getCanonical(coin.series),
            getTrans(coin.series),
            getCanonical(coin.subtype),
            getTrans(coin.subtype),
            flattenSearchValue(coin.stats || {})
        ].join(' ');
    }

    function flattenSearchValue(value) {
        if (value == null) return '';
        if (Array.isArray(value)) return value.map(flattenSearchValue).join(' ');
        if (typeof value === 'object') return Object.values(value).map(flattenSearchValue).join(' ');
        return String(value);
    }

    function normalizeText(value) {
        return String(value || '')
            .toLowerCase()
            .normalize('NFKD')
            .replace(/[\u0591-\u05C7]/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function updateSearchControls() {
        const hasQuery = searchQuery.length > 0;
        document.getElementById('clear-search').classList.toggle('is-visible', hasQuery);
        document.getElementById('clear-filters').classList.toggle('is-visible', hasQuery);
    }

    function updateResultsSummary(count, total) {
        const summary = document.getElementById('result-summary');
        if (!allCoins.length) {
            summary.textContent = getTrans('טוען נתונים...');
            return;
        }
        summary.textContent = `${getTrans('מציג')} ${count} ${getTrans('מתוך')} ${total} ${getTrans('פריטים')}`;
    }

    function clearSearch() {
        searchQuery = '';
        searchInput.value = '';
        updateSearchControls();
        setView(currentView, false);
        searchInput.focus();
    }

    function showLoadingState() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = `
            <div class="loading-state" aria-label="${escapeAttr(getTrans('טוען נתונים...'))}">
                <div class="skeleton-grid" aria-hidden="true">
                    ${Array.from({ length: 10 }).map(() => '<div class="skeleton-card"></div>').join('')}
                </div>
            </div>
        `;
    }

    function showEmptyState() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-inner">
                    <div class="empty-icon" aria-hidden="true">⌕</div>
                    <h2>${escapeHtml(getTrans('אין תוצאות'))}</h2>
                    <p>${escapeHtml(getTrans('לא נמצאו מטבעות שמתאימים לחיפוש.'))}<br>${escapeHtml(getTrans('נקה את החיפוש או נסה מילות מפתח אחרות.'))}</p>
                    <button type="button" class="primary-action" onclick="clearSearch()">${escapeHtml(getTrans('נקה חיפוש'))}</button>
                </div>
            </div>
        `;
    }

    function showErrorState() {
        document.getElementById('result-summary').textContent = getTrans('הנתונים לא נטענו');
        document.getElementById('gallery').innerHTML = `
            <div class="error-state">
                <div class="error-state-inner">
                    <div class="error-icon" aria-hidden="true">!</div>
                    <h2>${escapeHtml(getTrans('הנתונים לא נטענו'))}</h2>
                    <p>${escapeHtml(getTrans('בדקו את החיבור או נסו לרענן את העמוד.'))}</p>
                    <button type="button" class="primary-action" onclick="window.location.reload()">${escapeHtml(getTrans('רענון'))}</button>
                </div>
            </div>
        `;
    }

    function openModalBySlug(slug, updateUrl = true) {
        const coin = coinLookup.get(slug) || allCoins.find(c => getCoinSlug(c) === slug);
        if (coin) openModalByCoin(coin, updateUrl);
    }

    function openModalByCoin(coin, updateUrl = true) {
        lastFocusedElement = document.activeElement;
        const modal = document.getElementById('coinModal');
        const modalContent = modal.querySelector('.modal-content');
        currentCoinSlug = getCoinSlug(coin);
        
        if (updateUrl) {
            const url = new URL(window.location);
            url.searchParams.set('coin', currentCoinSlug);
            url.hash = '';
            window.history.pushState({}, '', url);
        }

        const name = getTrans(getCanonical(coin.name));
        const series = getTrans(getCanonical(coin.series));
        const subtype = getTrans(getCanonical(coin.subtype));

        document.getElementById('modal-kicker').textContent = getTrans('פרטי המטבע');
        document.getElementById('modal-title').textContent = name + (subtype && subtype !== getTrans('ללא תיוג') ? ` (${subtype})` : '');
        document.getElementById('modal-subtitle').textContent = `${coin.year} • ${series}`;
        document.getElementById('modal-feedback').textContent = '';
        
        const descEl = document.getElementById('modal-desc');
        const desc = getDescription(coin);
        descEl.innerHTML = desc;
        descEl.style.display = desc ? 'block' : 'none';
        
        const imgContainer = document.getElementById('modal-images-container');
        imgContainer.innerHTML = ''; 
        if (galleryViewer) galleryViewer.destroy();

        if (coin.has_image && coin.images && coin.images.length > 0) {
            coin.images.forEach(imgSrc => {
                const wrapper = document.createElement('div');
                wrapper.className = 'modal-image-wrapper';

                const img = document.createElement('img');
                img.src = '/images/' + imgSrc;
                img.alt = `${getTrans('הגדלת תמונה של')} ${name}`;
                img.loading = 'eager';
                img.decoding = 'async';
                
                wrapper.appendChild(img);
                imgContainer.appendChild(wrapper);
            });
            if (typeof Viewer !== 'undefined') {
                galleryViewer = new Viewer(imgContainer, { inline: false, toolbar: true, navbar: true, title: false });
            }
        } else {
            const noImg = document.createElement('div');
            noImg.className = 'no-image';
            noImg.textContent = '?';
            noImg.style.minHeight = '320px';
            imgContainer.appendChild(noImg);
        }

        const table = document.getElementById('modal-stats');
        table.innerHTML = `<caption class="sr-only">${escapeHtml(getTrans('פרטי המטבע'))}</caption>`;
        const ignored = ['description', 'alt'];
        const stats = coin.stats || {};
        const validKeys = Object.keys(stats).filter(k => !ignored.includes(k.toLowerCase()) && getTrans(stats[k]));

        if (validKeys.length > 0) {
            table.style.display = 'table';
            validKeys.forEach(key => {
                const row = document.createElement('tr');
                const keyCell = document.createElement('td');
                const valCell = document.createElement('td');
                keyCell.className = 'stats-key';
                valCell.className = 'stats-val';
                keyCell.textContent = getTrans(key);
                valCell.textContent = getTrans(stats[key]);
                row.appendChild(keyCell);
                row.appendChild(valCell);
                table.appendChild(row);
            });
        } else {
            table.style.display = 'none';
        }

        modalContent.classList.toggle('no-details', validKeys.length === 0 && !desc);
        modal.classList.add('is-open');
        modal.style.display = 'grid';
        document.body.classList.add('modal-open');
        const closeBtn = modal.querySelector('.close-btn');
        if (closeBtn) closeBtn.focus();
    }

    function getDescription(coin) {
        const stats = coin.stats || {};
        if (!stats.description) return '';
        if (stats.description.he) {
            return currentLang === 'en'
                ? (stats.description.en || stats.description.he)
                : stats.description.he;
        }
        return getTrans(stats.description);
    }

    function closeModal(updateUrl = true) { 
        const modal = document.getElementById('coinModal');
        modal.classList.remove('is-open');
        modal.style.display = 'none';
        currentCoinSlug = '';
        if (galleryViewer) {
            galleryViewer.destroy();
            galleryViewer = null;
        }
        document.body.classList.remove('modal-open');
        if (updateUrl) {
            const url = new URL(window.location);
            url.searchParams.delete('coin');
            window.history.pushState({}, '', url);
        }
        if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') lastFocusedElement.focus();
    }

    function isModalOpen() {
        return document.getElementById('coinModal').classList.contains('is-open');
    }

    async function copyCurrentCoinLink() {
        const feedback = document.getElementById('modal-feedback');
        const url = new URL(window.location);
        if (currentCoinSlug) url.searchParams.set('coin', currentCoinSlug);
        url.hash = '';
        try {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(url.toString());
            } else {
                fallbackCopyText(url.toString());
            }
            feedback.textContent = getTrans('הקישור הועתק');
        } catch (error) {
            feedback.textContent = getTrans('לא ניתן להעתיק את הקישור');
        }
    }

    function fallbackCopyText(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: prefersReducedMotion() ? 'auto' : 'smooth' });
    }

    function prefersReducedMotion() {
        return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }
    
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && isModalOpen()) {
            if (galleryViewer && galleryViewer.fulled) return;
            closeModal();
        }

        const modal = document.getElementById('coinModal');
        if (isModalOpen() && event.key === 'Tab') {
            const focusableElements = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (!focusableElements.length) return;
            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];
            if (event.shiftKey) { 
                if (document.activeElement === firstElement) {
                    lastElement.focus();
                    event.preventDefault();
                }
            } else if (document.activeElement === lastElement) {
                firstElement.focus();
                event.preventDefault();
            }
        }
    });
</script>

</body>
