<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ og_title | default('ארכיון המטבעות הישראלי') }}</title>
    
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_desc }}">
    <meta property="og:image" content="{{ og_image }}"> 
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_desc }}">
    <meta name="twitter:image" content="{{ og_image }}">
        
    <link rel="icon" type="image/png" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script data-goatcounter="https://coinsofisrael.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Heebo:wght@400;500;700;900&display=swap');

        :root { 
            --primary: #0038b8; 
            --primary-hover: #002a8a;
            --bg: #f8fafc; 
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 25px -3px rgba(0,0,0,0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-pill: 50px;
        }
        
        *, *:before, *:after { box-sizing: border-box; }

        html, body { 
            font-family: 'Heebo', 'Assistant', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 0; 
            text-align: right; 
            overflow-x: hidden; width: 100%;
            scroll-behavior: smooth;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: transparent;
        }

        .btn-outline {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        .btn-outline:hover {
            background: var(--bg);
            border-color: #cbd5e1;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 20px 20px 40px;
            width: 100%;
        }
        h1 { 
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: var(--primary); 
            margin: 0;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        /* Sticky Toolbar */
        .toolbar-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* Segmented Controls */
        .segmented-control {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: var(--radius-pill);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .segmented-control button {
            background: transparent;
            border: none;
            padding: 10px 24px;
            border-radius: var(--radius-pill);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .segmented-control button:hover:not(.active):not(.cat-active):not(:disabled) {
            color: var(--text-main);
        }

        .segmented-control button.active, 
        .segmented-control button.cat-active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .segmented-control button.cat-active {
            color: var(--text-main); /* Differentiate categories from views */
        }

        .segmented-control button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Jump Select */
        .jump-select {
            padding: 10px 20px;
            font-size: 15px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            min-width: 180px;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; 
            background-position: left 15px center; 
            background-size: 16px auto;
            padding-left: 40px;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s ease;
        }
        .jump-select:hover { border-color: #cbd5e1; }
        .jump-select:focus { outline: 2px solid var(--primary); outline-offset: 1px; }

        /* Main Content */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        html[dir="ltr"] body { text-align: left; }
        html[dir="ltr"] .coin-meta { direction: ltr; } 
        html[dir="ltr"] .series-headline { border-right: none; border-left: 4px solid var(--primary); }
        html[dir="ltr"] .modal-content { direction: ltr; text-align: left; }
        html[dir="ltr"] .modal-right:not(.no-details-header) { text-align: left; }
        html[dir="ltr"] .stats-key { text-align: left; }
        html[dir="ltr"] .jump-select { background-position: right 15px center; padding-left: 20px; padding-right: 40px; }
        
        .skip-link { position: absolute; top: -40px; right: 0; background: var(--primary); color: #fff; padding: 10px 15px; z-index: 9999; text-decoration: none; font-weight: bold; border-radius: 0 0 0 8px; transition: top 0.3s; }
        .skip-link:focus { top: 0; }
        button:focus-visible, a:focus-visible, .coin-card:focus-visible, .close-btn:focus-visible { outline: 3px solid #ff9900; outline-offset: 2px; }

        /* Gallery Structure */
        .group-section { margin-bottom: 80px; scroll-margin-top: 100px; }
        .group-header { margin-bottom: 25px; display: flex; align-items: center; }
        .group-title { font-size: 2.2em; color: var(--text-main); margin: 0; font-weight: 800; }
        
        .series-headline { 
            color: var(--text-main); 
            padding: 10px 20px; 
            border-right: 4px solid var(--primary); 
            margin: 40px 0 20px 0; 
            font-size: 1.5em; 
            font-weight: 700; 
            background: var(--surface);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            display: inline-block;
            scroll-margin-top: 100px; 
        }

        .coin-type-row { margin-bottom: 30px; }
        
        /* Coin Cards */
        .coin-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
        }
        
        .coin-card { 
            background: var(--surface); 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; 
            display: flex;
            flex-direction: column;
        }
        .coin-card:hover { 
            transform: translateY(-5px); 
            box-shadow: var(--shadow-lg); 
            border-color: #cbd5e1;
        }

        .coin-img-wrapper { 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%); 
            position: relative; 
            padding: 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        .coin-img-wrapper img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .coin-card:hover .coin-img-wrapper img {
            transform: scale(1.05);
        }

        .no-image { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3em; color: #cbd5e1; font-weight: bold; }
        
        .coin-info { padding: 20px 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center;}
        .coin-name { font-weight: 700; font-size: 1.1em; margin-bottom: 8px; color: var(--text-main); line-height: 1.3;}
        .coin-meta { font-size: 0.9em; color: var(--text-muted); direction: ltr; display: inline-block; font-weight: 500;}
        .badge { background: #e0e7ff; color: var(--primary); padding: 4px 10px; border-radius: var(--radius-pill); font-size: 0.75em; display: inline-block; margin-top: 10px; font-weight: 700; }
        .badge.gray { background: #f1f5f9; color: var(--text-muted); }

        /* Modal / Dialog */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-content { 
            background-color: var(--surface); 
            margin: 4vh auto; 
            border-radius: 24px; 
            width: 92%; 
            max-width: 1000px; 
            height: 92vh; 
            display: flex; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            animation: popup 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        @keyframes popup {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-left { 
            width: 60%; 
            background: #111827; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 40px 20px; 
            position: relative;
        }
        .modal-image-wrapper { width: 100%; display: flex; justify-content: center; padding-bottom: 30px; margin-bottom: 30px; }
        .modal-image-wrapper:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-left img { max-width: 90%; max-height: 60vh; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3)); cursor: zoom-in; }
        
        .modal-right { 
            width: 40%; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            text-align: right; 
            overflow-y: auto; 
            background: var(--surface);
            position: relative;
        }

        .modal-content.no-details { flex-direction: column; background-color: #111827; height: auto; max-height: 90vh; }
        .modal-content.no-details .modal-right { order: -1; width: 100%; background-color: var(--surface); padding: 25px 40px; border-bottom: 1px solid var(--border); text-align: center; flex-shrink: 0; }
        .modal-content.no-details .modal-left { width: 100%; flex-grow: 1; min-height: 300px; }
        .modal-content.no-details .modal-left img { max-height: 50vh; }
        .modal-content.no-details .stats-table, .modal-content.no-details #modal-desc { display: none !important; }

        .close-btn { 
            position: absolute;
            top: 25px;
            left: 25px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f1f5f9;
            color: var(--text-muted);
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }
        html[dir="ltr"] .close-btn { left: auto; right: 25px; }
        .close-btn:hover { background: #e2e8f0; color: var(--text-main); transform: rotate(90deg); }

        .modal-title { font-size: 2.2em; color: var(--text-main); margin-top: 0; margin-bottom: 8px; font-weight: 800; line-height: 1.2; padding-left: 50px; }
        html[dir="ltr"] .modal-title { padding-left: 0; padding-right: 50px; }
        .modal-subtitle { font-size: 1.1em; color: var(--primary); margin-bottom: 25px; font-weight: 600; }
        
        #modal-desc { margin-bottom: 30px; color: var(--text-muted); line-height: 1.6; font-size: 1.05em; }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        .stats-table td { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-key { font-weight: 600; color: var(--text-muted); width: 45%; }
        .stats-val { font-weight: 500; color: var(--text-main); }
        
        footer { margin-top: 60px; padding: 30px; text-align: center; border-top: 1px solid var(--border); background: var(--surface); }
        footer a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.2s; }
        footer a:hover { color: var(--primary); }
        
        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .toolbar { gap: 12px; }
            .segmented-control { width: 100%; justify-content: center; }
            .segmented-control button { flex: 1; text-align: center; padding: 10px 5px; font-size: 14px; }
            .jump-select { width: 100%; }
            
            .modal-content { flex-direction: column !important; margin: 0; width: 100%; height: 100%; border-radius: 0; }
            .modal-left, .modal-right { width: 100% !important; flex: none; }
            
            .modal-right { order: 1 !important; padding: 30px 20px; text-align: right !important; }
            html[dir="ltr"] .modal-right { text-align: left !important; }
            
            .modal-left { order: 2 !important; padding: 30px 0; min-height: 40vh; }
            .modal-left img { max-width: 85vw !important; max-height: 40vh !important; }
            
            .close-btn { position: fixed; top: 15px; left: 15px; box-shadow: var(--shadow-md); }
            html[dir="ltr"] .close-btn { left: auto; right: 15px; }
            .modal-title { padding-left: 0; font-size: 1.8em; }
        }
    </style>
</head>
<body>

<a href="#main-content" class="skip-link">דלג לתוכן</a>

<div class="top-nav">
    <button class="btn-outline" onclick="toggleLanguage()">🇺🇸 English</button>
    <a href="/about" class="btn-outline" id="btn-about">אודות ותודות</a>
</div>

<header role="banner" class="hero">
    <h1 id="site-title">ארכיון המטבעות הישראלי</h1>
</header>

<div class="toolbar-wrapper">
    <div class="toolbar" aria-label="סרגל כלים">
        <nav class="segmented-control" aria-label="קטגוריה">
            <button id="btn-cat-circ" class="cat-active" onclick="setCategory('circulation')">מחזור</button>
            <button id="btn-cat-sets" onclick="setCategory('sets')">סטים לאספנים</button>
        </nav>

        <nav class="segmented-control" aria-label="אפשרויות תצוגה">
            <button id="btn-year" class="active" onclick="setView('year')" aria-pressed="true">לפי שנה</button>
            <button id="btn-coin" onclick="setView('coin')" aria-pressed="false">לפי סוג</button>
        </nav>

        <select id="jump-select" class="jump-select" onchange="jumpToSection(this.value)" aria-label="קפוץ לשנה או נושא">
            <option id="jump-default" value="">קפוץ ל...</option>
        </select>
    </div>
</div>

<main id="main-content">
    <div id="gallery" role="region" aria-live="polite">
        <div style="text-align: center; padding: 50px; color: #64748b; font-size: 1.2em; font-weight: bold;">טוען נתונים...</div>
    </div>
</main>

<footer>
    <a href="/accessibility" id="footer-acc">הצהרת נגישות</a>
</footer>

<div id="coinModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <div id="modal-images-container" class="modal-left"></div>
        <div class="modal-right">
            <button class="close-btn" onclick="closeModal()" aria-label="סגור חלונית">&times;</button>
            <h2 id="modal-title" class="modal-title"></h2>
            <div id="modal-subtitle" class="modal-subtitle"></div>
            <div id="modal-desc"></div>
            <table class="stats-table" id="modal-stats"></table>
        </div>
    </div>
</div>

<script>
    // Note: The JS logic is kept exactly as original to ensure full compatibility with your app.py backend.
    let allCoins = [];
    let translationMap = {}; 
    let sortConfig = {};
    let galleryViewer = null;
    let lastFocusedElement = null;

    const urlParams = new URLSearchParams(window.location.search);
    let currentLang = urlParams.get('lang') === 'en' ? 'en' : 'he';
    let urlCat = urlParams.get('category') || 'circulation';
    const catMap = { 'circulation': 'מחזור', 'sets': 'סטים לאספנים' };
    let currentCategory = catMap[urlCat] || 'מחזור';
    let currentView = urlParams.get('view') || 'year';

    Promise.all([
        fetch('/api/data').then(res => res.json()),
        fetch('/api/translations').then(res => res.json())
    ]).then(([data, translations]) => {
        allCoins = data.coins;
        sortConfig = data.config || {};
        translationMap = translations;
        updateState(false);
        checkUrlAndOpen();
    });

    function updateState(pushHistory = true) {
        document.documentElement.dir = (currentLang === 'he') ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        
        const langBtn = document.querySelector('.btn-outline');
        if (langBtn) langBtn.textContent = (currentLang === 'he') ? '🇺🇸 English' : '🇮🇱 עברית';

        const isSets = (currentCategory === 'סטים לאספנים');
        const catKey = isSets ? 'sets' : 'circulation';
        
        document.getElementById('btn-cat-circ').className = !isSets ? 'cat-active' : '';
        document.getElementById('btn-cat-sets').className = isSets ? 'cat-active' : '';
        
        const btnYear = document.getElementById('btn-year');
        const btnCoin = document.getElementById('btn-coin');
        if (isSets) {
            btnYear.disabled = true;
            btnCoin.disabled = true;
        } else {
            btnYear.disabled = false;
            btnCoin.disabled = false;
        }

        document.getElementById('site-title').textContent = getTrans('ארכיון המטבעות הישראלי');
        document.getElementById('btn-year').textContent = getTrans('לפי שנה');
        document.getElementById('btn-coin').textContent = getTrans('לפי סוג');
        document.getElementById('btn-about').textContent = getTrans('אודות ותודות');
        document.getElementById('footer-acc').textContent = getTrans('הצהרת נגישות');
        document.getElementById('btn-cat-circ').textContent = getTrans('מחזור');
        document.getElementById('btn-cat-sets').textContent = getTrans('סטים לאספנים');
        
        document.getElementById('jump-default').textContent = (currentLang === 'he') ? 'קפוץ ל...' : 'Jump to...';

        if (pushHistory) {
            const url = new URL(window.location);
            url.searchParams.set('lang', currentLang);
            url.searchParams.set('category', catKey);
            url.searchParams.set('view', isSets ? 'sets' : currentView); 
            window.history.pushState({}, '', url);
        }

        if (isSets) {
            setView('sets', false);
        } else {
            setView(currentView, false); 
        }
    }

    function toggleLanguage() {
        currentLang = (currentLang === 'he') ? 'en' : 'he';
        updateState();
    }

    function setCategory(catKey) {
        currentCategory = catMap[catKey] || 'מחזור';
        if (currentCategory === 'מחזור') {
            document.getElementById('btn-year').classList.add('active');
            document.getElementById('btn-coin').classList.remove('active');
            currentView = 'year';
        }
        updateState();
    }

    function getTrans(text) {
        if (!text) return "";
        if (typeof text === 'object' && text.he) text = text.he;
        if (typeof text !== 'string' && typeof text !== 'number') return "";
        if (currentLang === 'en' && translationMap[text]) return translationMap[text];
        return text;
    }

    function getCanonical(obj) {
        if (!obj) return "";
        if (typeof obj === 'string') return obj;
        return obj.he || "";
    }

    function getCoinSlug(coin) {
        const nameHe = getCanonical(coin.name);
        const seriesHe = getCanonical(coin.series);
        const subtypeHe = coin.subtype ? getCanonical(coin.subtype) : "";
        let slug = `${coin.year}_${nameHe}_${seriesHe}`;
        if (subtypeHe && subtypeHe !== 'ללא תיוג') slug += `_${subtypeHe}`;
        return slug.replace(/\s+/g, '-').replace(/[()]/g, '');
    }

    function checkUrlAndOpen() {
        const urlParams = new URLSearchParams(window.location.search);
        const coinSlug = urlParams.get('coin');
        
        if (coinSlug) {
            const targetCoin = allCoins.find(c => getCoinSlug(c) === coinSlug);
            if (targetCoin) {
                const coinDataStr = encodeURIComponent(JSON.stringify(targetCoin));
                openModal(coinDataStr, false); 
            }
        } else {
            closeModal(false);
            if (window.location.hash) {
                setTimeout(() => {
                    const targetId = decodeURIComponent(window.location.hash.substring(1));
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 300);
            }
        }
    }
    window.addEventListener('popstate', checkUrlAndOpen); 

    function extractYear(str) {
        if (!str) return 9999;
        const match = str.toString().match(/(\d{4})/);
        return match ? parseInt(match[0]) : 9999;
    }
    function getNumericValue(nameObj) {
        const name = getCanonical(nameObj); 
        if(name.includes('/')) {
            const parts = name.split('/');
            if(parts.length >= 2) {
                const num = parseFloat(parts[0].match(/[\d\.]+/));
                const den = parseFloat(parts[1].match(/[\d\.]+/));
                if(num && den) return num / den;
            }
        }
        const match = name.match(/([\d\.]+)/);
        return match ? parseFloat(match[0]) : 0;
    }
    function getSeriesRank(seriesObj) {
        const name = getCanonical(seriesObj); 
        if (!sortConfig.series_order) return 9999;
        const index = sortConfig.series_order.indexOf(name);
        return index !== -1 ? index : 9999;
    }
    function getCoinRank(seriesObj, coinNameObj) {
        const sName = getCanonical(seriesObj);
        const cName = getCanonical(coinNameObj);
        if (!sortConfig.coin_order || !sortConfig.coin_order[sName]) return 9999;
        const index = sortConfig.coin_order[sName].indexOf(cName);
        return index !== -1 ? index : 9999;
    }

    function updateJumpSelect(items) {
        const select = document.getElementById('jump-select');
        while (select.options.length > 1) select.remove(1);
        
        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.text = item.label; 
            select.add(opt);
        });
    }

    function jumpToSection(id) {
        if (!id) return;
        const element = document.getElementById(id);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            const url = new URL(window.location);
            url.hash = id;
            window.history.pushState({}, '', url);
            document.getElementById('jump-select').selectedIndex = 0;
        }
    }

    function setView(mode, updateUrl = true) {
        currentView = mode; 
        
        const btnYear = document.getElementById('btn-year');
        const btnCoin = document.getElementById('btn-coin');
        if (mode === 'sets') {
            btnYear.className = ''; btnCoin.className = '';
        } else {
            btnYear.className = mode === 'year' ? 'active' : '';
            btnCoin.className = mode === 'coin' ? 'active' : '';
            btnYear.setAttribute('aria-pressed', mode === 'year');
            btnCoin.setAttribute('aria-pressed', mode === 'coin');
        }
        
        if (updateUrl && mode !== 'sets') {
            const url = new URL(window.location);
            url.searchParams.set('view', mode);
            window.history.pushState({}, '', url);
        }

        const gallery = document.getElementById('gallery');
        gallery.innerHTML = '';

        const filteredCoins = allCoins.filter(c => getCanonical(c.category) === currentCategory);

        let grouped;
        if (mode === 'sets') {
            grouped = filteredCoins.reduce((acc, coin) => {
                const sKey = getCanonical(coin.series);
                acc[sKey] = acc[sKey] || [];
                acc[sKey].push(coin);
                return acc;
            }, {});
        } else {
            grouped = groupData(filteredCoins, mode);
        }
        
        const keys = Object.keys(grouped).sort((a,b) => {
            if (mode === 'year') {
                return extractYear(a) - extractYear(b); 
            } else {
                if (mode === 'sets') {
                    const idxA = sortConfig.series_order ? sortConfig.series_order.indexOf(a) : -1;
                    const idxB = sortConfig.series_order ? sortConfig.series_order.indexOf(b) : -1;
                    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
                } else {
                    const coinA = grouped[a][0];
                    const coinB = grouped[b][0];
                    const seriesRankA = getSeriesRank(coinA.series);
                    const seriesRankB = getSeriesRank(coinB.series);
                    if (seriesRankA !== seriesRankB) return seriesRankA - seriesRankB;
                    const coinRankA = getCoinRank(coinA.series, coinA.name);
                    const coinRankB = getCoinRank(coinB.series, coinB.name);
                    if (coinRankA !== coinRankB) return coinRankA - coinRankB;
                    return getNumericValue(coinA.name) - getNumericValue(coinB.name);
                }
            }
        });

        const jumpItems = [];
        let lastSeriesName = null;

        keys.forEach(key => {
            const sectionId = 'section-' + key.replace(/\s+/g, '-').replace(/[()]/g, '');
            const coinObj = grouped[key][0]; 
            
            let displayLabel = key;
            if (mode === 'year') {
                displayLabel = key; 
            } else if (mode === 'sets') {
                displayLabel = getTrans(coinObj.series);
            } else {
                displayLabel = getTrans(coinObj.name) + ' (' + getTrans(coinObj.series) + ')';
            }
            
            jumpItems.push({ id: sectionId, label: displayLabel });

            if (mode === 'year') {
                const section = document.createElement('div');
                section.className = 'group-section';
                section.innerHTML = `<div class="group-header" id="${sectionId}"><h2 class="group-title">${displayLabel}</h2></div>`;
                
                const coinsInYear = grouped[key];
                const bySeries = coinsInYear.reduce((acc, coin) => {
                    const sKey = getCanonical(coin.series);
                    acc[sKey] = acc[sKey] || [];
                    acc[sKey].push(coin);
                    return acc;
                }, {});

                const seriesKeys = Object.keys(bySeries).sort((sa, sb) => {
                    const idxA = sortConfig.series_order ? sortConfig.series_order.indexOf(sa) : -1;
                    const idxB = sortConfig.series_order ? sortConfig.series_order.indexOf(sb) : -1;
                    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
                });

                seriesKeys.forEach(sKey => {
                    const firstCoin = bySeries[sKey][0];
                    const seriesNameTrans = getTrans(getCanonical(firstCoin.series));
                    const seriesDiv = document.createElement('div');
                    seriesDiv.innerHTML = `<div class="series-headline">${seriesNameTrans}</div>`;
                    section.appendChild(seriesDiv);

                    const byCoinType = bySeries[sKey].reduce((acc, coin) => {
                        const cKey = getCanonical(coin.name);
                        acc[cKey] = acc[cKey] || [];
                        acc[cKey].push(coin);
                        return acc;
                    }, {});

                    const coinTypeKeys = Object.keys(byCoinType).sort((nA, nB) => {
                        const idxA = (sortConfig.coin_order[sKey] || []).indexOf(nA);
                        const idxB = (sortConfig.coin_order[sKey] || []).indexOf(nB);
                        if(idxA !== -1 && idxB !== -1) return idxA - idxB;
                        if(idxA !== -1) return -1;
                        if(idxB !== -1) return 1;
                        return getNumericValue(nA) - getNumericValue(nB);
                    });

                    let simpleCoinsBuffer = [];
                    coinTypeKeys.forEach(cType => {
                        const coinsOfType = byCoinType[cType];
                        if (coinsOfType.length > 1) {
                            if (simpleCoinsBuffer.length > 0) {
                                renderRow(section, simpleCoinsBuffer, mode);
                                simpleCoinsBuffer = [];
                            }
                            renderRow(section, coinsOfType, mode);
                        } else {
                            simpleCoinsBuffer.push(coinsOfType[0]);
                        }
                    });
                    if (simpleCoinsBuffer.length > 0) renderRow(section, simpleCoinsBuffer, mode);
                });
                gallery.appendChild(section);
            } else {
                let coinList = grouped[key];
                coinList.sort((a,b) => extractYear(a.year) - extractYear(b.year));

                const currentSeriesCanonical = getCanonical(coinObj.series);
                
                if (currentSeriesCanonical !== lastSeriesName) {
                    const headlineDiv = document.createElement('div');
                    headlineDiv.innerHTML = `<div class="series-headline">${getTrans(coinObj.series)}</div>`;
                    gallery.appendChild(headlineDiv);
                    lastSeriesName = currentSeriesCanonical;
                }
                const section = document.createElement('div');
                section.className = 'group-section';
                
                if (mode !== 'sets') {
                    section.innerHTML = `<div class="group-header" id="${sectionId}"><h2 class="group-title">${getTrans(coinObj.name)}</h2></div>`;
                } else {
                    section.id = sectionId;
                }
                
                renderRow(section, coinList, mode);
                gallery.appendChild(section);
            }
        });
        
        updateJumpSelect(jumpItems);
    }

    function renderRow(container, coins, mode) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'coin-type-row';
        let html = `<div class="coin-grid">`;
        coins.forEach(coin => html += createCardHtml(coin, mode));
        html += `</div>`;
        rowDiv.innerHTML = html;
        container.appendChild(rowDiv);
        const cards = rowDiv.querySelectorAll('.coin-card');
        cards.forEach(card => {
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
        });
    }

    function createCardHtml(coin, mode) {
        const name = getTrans(getCanonical(coin.name));
        const series = getTrans(getCanonical(coin.series));
        const subtype = getTrans(getCanonical(coin.subtype));

        let imgHtml;
        let altText = `מטבע ${name}`;
        if (coin.stats && coin.stats.alt) altText = getTrans(coin.stats.alt);

        if (coin.has_image && coin.images.length > 0) {
            const folder = coin.thumb_available ? 'thumbnails' : 'images';
            imgHtml = `<img src="/${folder}/${coin.thumb_src}" loading="lazy" alt="${altText}" title="${altText}">`;
        } else {
            imgHtml = `<div class="no-image" aria-hidden="true">?</div>`;
        }

        const coinDataStr = encodeURIComponent(JSON.stringify(coin));
        
        let badgeHtml = '';
        if (subtype && subtype !== getTrans('ללא תיוג')) {
            badgeHtml = `<span class="badge">${subtype}</span>`;
        } else if (subtype && subtype === getTrans('ללא תיוג')) {
             badgeHtml = `<span class="badge gray">${subtype}</span>`;
        }

        const yearLabel = getTrans('שנה');
        const ariaLabel = `${name}, ${yearLabel} ${coin.year}, ${subtype ? subtype : ''}`;

        return `
            <div class="coin-card" tabindex="0" role="button" aria-label="${ariaLabel}" title="${altText}" onclick="openModal('${coinDataStr}')">
                <div class="coin-img-wrapper">${imgHtml}</div>
                <div class="coin-info">
                    <div class="coin-name">${name}</div>
                    <div class="coin-meta" aria-label="${yearLabel} ${coin.year}">
                        ${mode === 'year' ? series : coin.year}
                    </div>
                    ${badgeHtml}
                </div>
            </div>
        `;
    }

    function groupData(data, mode) {
        return data.reduce((acc, item) => {
            let key;
            if (mode === 'year') {
                key = item.year;
            } else {
                const nHe = getCanonical(item.name);
                const sHe = getCanonical(item.series);
                key = nHe + ' (' + sHe+')';
            }
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});
    }

    function openModal(coinDataStr, updateUrl = true) {
        lastFocusedElement = document.activeElement;
        const coin = JSON.parse(decodeURIComponent(coinDataStr));
        const modal = document.getElementById('coinModal');
        const modalContent = modal.querySelector('.modal-content');
        
        if (updateUrl) {
            const slug = getCoinSlug(coin);
            const url = new URL(window.location);
            url.searchParams.set('coin', slug); 
            url.hash = ''; 
            window.history.pushState({}, '', url);
        }

        const name = getTrans(getCanonical(coin.name));
        const series = getTrans(getCanonical(coin.series));
        const subtype = getTrans(getCanonical(coin.subtype));

        document.getElementById('modal-title').textContent = name + (subtype && subtype !== getTrans('ללא תיוג') ? ` (${subtype})` : '');
        document.getElementById('modal-subtitle').textContent = `${coin.year} • ${series}`;
        
        let desc = "";
        if (coin.stats && coin.stats.description) {
            if (coin.stats.description.he) { 
                desc = currentLang === 'en' ? coin.stats.description.en : coin.stats.description.he;
            } else {
                desc = getTrans(coin.stats.description);
            }
        }
        document.getElementById('modal-desc').innerHTML = desc;
        
        const imgContainer = document.getElementById('modal-images-container');
        imgContainer.innerHTML = ''; 
        if (galleryViewer) galleryViewer.destroy();

        if (coin.has_image && coin.images.length > 0) {
            coin.images.forEach(imgSrc => {
                const wrapper = document.createElement('div');
                wrapper.className = 'modal-image-wrapper';

                const img = document.createElement('img');
                img.src = "/images/" + imgSrc;
                img.alt = `Zoomed image of ${name}`;
                
                wrapper.appendChild(img);
                imgContainer.appendChild(wrapper);
            });
            galleryViewer = new Viewer(imgContainer, { inline: false, toolbar: true, navbar: true });
        } else {
            const noImg = document.createElement('div');
            noImg.className = 'no-image';
            noImg.textContent = '?';
            noImg.style.width = '100%';
            noImg.style.height = '300px';
            imgContainer.appendChild(noImg);
        }

        const table = document.getElementById('modal-stats');
        table.innerHTML = '';
        const ignored = ['description', 'alt'];
        const stats = coin.stats || {};
        const validKeys = Object.keys(stats).filter(k => !ignored.includes(k.toLowerCase()));

        if (validKeys.length > 0) {
            table.style.display = 'table';
            modalContent.classList.remove('no-details');
            document.getElementById('modal-desc').style.display = desc ? 'block' : 'none';
            validKeys.forEach(key => {
                const val = getTrans(stats[key]);
                const label = getTrans(key);
                table.innerHTML += `<tr><td class="stats-key">${label}</td><td class="stats-val">${val}</td></tr>`;
            });
        } else {
            table.style.display = 'none';
            document.getElementById('modal-desc').style.display = 'none';
            modalContent.classList.add('no-details');
        }
        
        modal.style.display = "block";
        const closeBtn = modal.querySelector('.close-btn');
        if (closeBtn) closeBtn.focus();
        document.body.style.overflow = 'hidden';
    }

    function closeModal(updateUrl = true) { 
        document.getElementById('coinModal').style.display = "none"; 
        if (galleryViewer) { galleryViewer.destroy(); galleryViewer = null; }
        document.body.style.overflow = 'auto';
        if (updateUrl) {
            const url = new URL(window.location);
            url.searchParams.delete('coin');
            window.history.pushState({}, '', url);
        }
        if (lastFocusedElement) lastFocusedElement.focus();
    }
    
    window.onclick = function(event) { if (event.target == document.getElementById('coinModal')) closeModal(); }
    document.addEventListener('keydown', function(event) {
        if (event.key === "Escape") {
            if (galleryViewer && galleryViewer.fulled) return;
            closeModal();
        }
        const modal = document.getElementById('coinModal');
        if (modal.style.display === "block" && event.key === 'Tab') {
            const focusableElements = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
            if (focusableElements.length > 0) {
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];
                if (event.shiftKey) { 
                    if (document.activeElement === firstElement) { lastElement.focus(); event.preventDefault(); }
                } else { 
                    if (document.activeElement === lastElement) { firstElement.focus(); event.preventDefault(); }
                }
            }
        }
    });
</script>
